<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ホテル会員証 デモアプリ</title>
  <style>
    /* --- 基本リセット ＆ 全体スタイル --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      padding-bottom: 70px;
    }

    /* --- ページ切り替え用の制御スタイル --- */
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    /* --- ホーム画面：トップ画像エリア --- */
    .hero-section {
      width: 100%;
      height: 220px;
      background-image: url('main_img01.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* ホテルロゴ用スタイル */
    .hotel-logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 20px 5px 20px;
    }
    .hotel-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    /* --- イベント画面 --- */
    .event-card {
      background: #fff;
      margin: 15px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .event-img {
      width: 100%;
      height: 200px;
      /* 【修正】新しく用意した画像ファイル名に変更 */
      background-image: url('hiyashimen2026.jpg');
      background-size: cover;
      background-position: center;
    }
    .event-detail {
      padding: 15px;
    }

    /* --- 会員証エリア --- */
    .card-section {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .membership-card {
      width: 100%;
      max-width: 350px;
      height: 210px;
      color: #fff;
      border-radius: 12px;
      padding: 20px;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      background-size: cover;
      background-position: center;
      transition: background-image 0.5s ease, color 0.5s ease;
    }

    /* カードのファイル名 */
    .card-bronze {
      background-image: url('bronze.png');
    }
    .card-silver {
      background-image: url('silver.png');
      color: #333 !important;
    }
    .card-silver .card-sub-text { color: #555 !important; }

    .card-gold {
      background-image: url('gold.png');
    }
    .card-platinum {
      background-image: url('platinum.png');
      color: #fff;
    }

    /* デモ用：ポイント追加パネル */
    .point-panel {
      margin-top: 20px;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:active { opacity: 0.8; }

    /* --- 下部メニューバー --- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #ffffff;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #666;
      text-decoration: none;
      cursor: pointer;
    }
    .nav-item.active {
      color: #d4af37;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="home-page" class="page active">
    <div class="hero-section"></div>
    <div class="hotel-logo-area">
      <img src="icon.png" alt="ホテルロゴ" class="hotel-logo">
      <h2>ファインメンバーズへ</h2>
    </div>
    <div style="padding: 0 20px 20px 20px;">
      <p style="color: #666; font-size: 14px;">快適なご滞在をサポートいたします。</p>
    </div>
  </div>

  <div id="card-page" class="page card-section">
    <div id="member-card-element" class="membership-card card-bronze">
      <div style="font-size: 18px; letter-spacing: 2px; font-weight: bold;">FINE MEMBERS</div>
      <div id="card-rank-text" class="card-sub-text" style="margin-top: 40px; font-size: 14px; color: #ccc;">RANK: BRONZE</div>
      <div style="margin-top: 5px; font-size: 20px; letter-spacing: 1px;">TAROU TANAKA</div>
      <div id="card-no-text" class="card-sub-text" style="position: absolute; bottom: 20px; right: 20px; font-size: 12px; color: #aaa;">No. 1234-5678</div>
    </div>

    <div class="point-panel">
      <p style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">
        現在の保有ポイント: <span id="current-pts" style="color: #d4af37; font-size: 18px;">0</span> pt
      </p>
      <button class="btn" onclick="addPoint('rest')">休憩を利用</button>
      <button class="btn" onclick="addPoint('stay')">宿泊を利用</button>
      <p
