<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ホテル会員証 デモアプリ</title>
  <style>
    /* --- 基本リセット ＆ 全体スタイル --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      padding-bottom: 70px; /* 下部メニューバーのスペースを確保 */
    }

    /* --- ホーム画面：トップ画像エリア --- */
    .hero-section {
      width: 100%;
      height: 220px; /* 推奨サイズ 800x440 の比率を意識 */
      /* 黒いフィルター(linear-gradient)を撤去し、画像のみに修正 */
      background-image: url('main_img01.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* --- イベント画面（仮画像エリア） --- */
    .event-card {
      background: #fff;
      margin: 15px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .event-img {
      width: 100%;
      height: 200px; /* 推奨サイズ 800x400 の比率 */
      /* 夏季限定「夏の冷やし麺フェア」仮画像（Unsplash） */
      background-image: url('https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?auto=format&fit=crop&w=800&q=80');
      background-size: cover;
      background-position: center;
    }
    .event-detail {
      padding: 15px;
    }

    /* --- 会員証エリア（縦画面固定デザイン） --- */
    .card-section {
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .membership-card {
      width: 100%;
      max-width: 350px;
      height: 210px;
      background: linear-gradient(135deg, #111 0%, #444 100%);
      color: #fff;
      border-radius: 12px;
      padding: 20px;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    /* --- 常時表示の下部メニューバー --- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background-color: #ffffff;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000; /* 最前面に配置 */
    }
    .nav-item {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #666;
      text-decoration: none;
      cursor: pointer;
    }

      color: #d
