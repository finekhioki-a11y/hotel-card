<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ホテル会員証 デモアプリ</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ファインメンバーズ">

  <style>
    /* --- 基本リセット ＆ 全体スタイル --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      display: flex;
      flex-direction: column;
    }

    /* 各画面全体の枠 */
    .page {
      display: none;
      flex: 1;
      height: calc(100dvh - 65px);
      overflow: hidden;
    }
    .page.active {
      display: flex;
      flex-direction: column;
    }

    /* 画面上部：ヘッダータイトルエリア */
    .page-header {
      width: 100%;
      padding: 25px 20px 10px 20px;
      text-align: center;
      background-color: #f5f5f5;
      flex-shrink: 0;
    }
    .page-header h2 {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
      color: #222;
      position: relative;
      display: inline-block;
      padding-bottom: 5px;
    }
    .page-header h2::after {
      content: '';
      position: absolute;
      left: 20%;
      bottom: 0;
      width: 60%;
      height: 2px;
      background: #d4af37;
    }

    /* 画面の中身（コンテンツ部分）スクロール設定 */
    .page-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 30px;
      width: 100%;
    }
    .center-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- ホーム画面：トップ画像エリア --- */
    .hero-section {
      width: 100%;
      height: 180px;
      background-image: url('main_img01.jpg');
      background-size: cover;
      background-position: center;
    }

    .hotel-logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px 20px 5px 20px;
    }
    .hotel-logo {
      width: 35px;
      height: 35px;
      object-fit: contain;
    }

    /* --- 会員証（共通カードデザイン） --- */
    .membership-card {
      width: 90%;
      max-width: 350px;
      height: 200px;
      color: #fff;
      border-radius: 12px;
      padding: 20px;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      background-size: cover;
      background-position: center;
      transition: background-image 0.5s ease, color 0.5s ease;
    }
    .home-card-wrapper {
      display: flex;
      justify-content: center;
      padding: 10px 0;
    }

    /* カードのファイル名 */
    .card-bronze { background-image: url('bronze.png'); }
    .card-silver {
      background-image: url('silver.png');
      color: #333 !important;
    }
    .card-silver .card-sub-text { color: #555 !important; }
    .card-gold { background-image: url('gold.png'); }
    .card-platinum { background-image: url('platinum.png'); color: #fff; }

    /* --- クーポン画面スタイル --- */
    .coupon-container {
      padding: 5px 15px 15px 15px;
    }
    .coupon-card {
      background: #fff;
      border-radius: 10px;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 5px solid #d4af37;
      display: flex;
      flex-direction: column;
    }
    .coupon-body {
      padding: 15px;
    }
    .coupon-title {
      font-size: 16px;
      font-weight: bold;
      color: #111;
    }
    .coupon-desc {
      font-size: 13px;
      color: #666;
      margin-top: 5px;
    }
    .coupon-footer {
      background: #fafafa;
      padding: 10px 15px;
      border-top: 1px dashed #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .use-btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 6px 15px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    /* --- イベント画面スタイル（リンク用の設定を微調整） --- */
    .event-link {
      text-decoration: none; /* 下線を消す */
      color: inherit; /* 文字色を親要素から引き継ぐ */
      display: block;
      cursor: pointer;
    }
    .event-card {
      background: #fff;
      margin: 10px 15px 20px 15px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    /* タップした時に少し沈む演出（リンクっぽさ、アプリ感を出すため） */
    .event-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .event-img {
      width: 100%;
      height: 180px;
      background-size: cover;
      background-position: center;
    }
    .event-detail {
      padding: 15px;
    }

    /* デモ用：ポイント追加パネル */
    .point-panel {
      margin-top: 20px;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    /* --- 下部メニューバー --- */
    .bottom-nav {
      height: 65px;
      background-color: #ffffff;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom
