<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Members Card</title>
    <link rel="manifest" href="manifest.json?v=5">
    <style>
        body {
            background-color: #0d0d0d; 
            color: #fff;
            font-family: 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 会員カードの土台 */
        .card-container {
            width: 330px;
            height: 208px;
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            
            /* 【ココを修正】画像をカードのサイズにぴったり合わせる設定を追加しました */
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease;
        }

        /* すりガラス風（グラスモーフィズム）のインフォメーションエリア */
        .info-overlay {
            position: absolute;
            right: 16px;
            top: 16px;
            pointer-events: none;
            
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            min-width: 150px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* ゲスト情報 */
        .member-info {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6); 
            margin-bottom: 2px;
            font-family: monospace;
        }

        /* ポイントカウントデザイン */
        .points-container {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* 「POINT」のラベル文字 */
        .points-label {
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: #d4af37; 
            text-transform: uppercase;
            margin-bottom: -2px;
        }

        /* 数字部分 */
        .points-display { 
            font-size: 32px; 
            font-weight: 200; 
            color: #ffffff; 
            line-height: 1;
            letter-spacing: -0.5px;
        }
        
        /* 単位（pt） */
        .points-unit {
            font-size: 14px;
            font-weight: 400;
            margin-left: 2px;
            color: rgba(255,255,255,0.7);
        }

        /* 隠しタップエリア（カード右下） */
        .secret-trigger {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 10;
        }

        /* スタッフ専用メニュー */
        .staff-section {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            text-align: center;
            background-color: #161616;
            width: 330px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .staff-title { font-size: 11px; color: #888; margin-bottom: 12px; font-weight: bold; letter-spacing: 1px; }
        
        button {
            background-color: #fff;
            color: #1a1a1a;
            border: none;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px 3px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .rest-btn { background-color: #d35400; color: #fff; }
        .other-btn { background-color: #2980b9; color: #fff; }
        .stay-btn { background-color: #27ae60; color: #fff; }
        .close-btn { background-color: #333; color: #aaa; font-size: 11px; padding: 6px 12px; margin-top: 15px; border-radius: 6px; }
        .reset-btn { background-color: #c0392b; color: white; font-size: 11px; padding: 6px 12px; margin-top: 15px; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="card" class="card-container">
        
        <div class="info-overlay">
            <div class="member-info">GUEST USER</div>
            <div class="member-info" style="margin-bottom: 0;">No. 2026-8871</div>
            
            <div class="points-container">
                <div class="points-label">POINT</div>
                <div class="points-display"><span id="pt-count">0</span><span class="points-unit">pt</span></div>
            </div>
        </div>
        
        <div class="secret-trigger" onclick="handleSecretClick()"></div>
    </div>

    <div id="staff-panel" class="staff-section">
        <div class="staff-title">【スタッフ専用メニュー】</div>
        <button class="rest-btn" onclick="processStay('休憩')">休憩 (1pt)</button>
        <button class="other-btn" onclick="processStay('その他休憩')">その他休憩 (1pt)</button>
        <button class="stay-btn" onclick="processStay('宿泊')">宿泊 (2pt※)</button>
        <br>
        <button class="close-btn" onclick="closePanel()">メニューを閉じる</button>
        <br>
        <button class="reset-btn" onclick="resetPoint()">データを初期化</button>
    </div>

    <script>
        const STAFF_PIN = "7777"; 
        const RANK_THRESHOLDS = { silver: 10, gold: 30, platinum: 60 }; 

        let points = parseInt(localStorage.getItem('hotel_points')) || 0;
        let currentRank = 'bronze';
        
        let clickCount = 0;
        let clickTimer = null;

        function updateUI() {
            document.getElementById('pt-count').innerText = points;
            const card = document.getElementById('card');
            
            if (points >= RANK_THRESHOLDS.platinum) {
                currentRank = 'platinum';
                card.style.backgroundImage = "url('platinum.png')";
            } else if (points >= RANK_THRESHOLDS.gold) {
                currentRank = 'gold';
                card.style.backgroundImage = "url('gold.png')";
            } else if (points >= RANK_THRESHOLDS.silver) {
                currentRank = 'silver';
                card.style.backgroundImage = "url('silver.png')";
            } else {
                currentRank = 'bronze';
                card.style.backgroundImage = "url('bronze.png')";
            }
        }

        function handleSecretClick() {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 800); 

            if (clickCount === 3) {
                clickCount = 0;
                document.getElementById('staff-panel').style.display = 'block';
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        // メニューを閉じる関数
        function closePanel() { 
            document.getElementById('staff-panel').style.display = 'none'; 
        }

        function processStay(type) {
            const pin = prompt(`【スタッフ確認】暗証番号を入力してください\n(${type}の処理)`);
            if (pin !== STAFF_PIN) { 
                alert("暗証番号が正しくありません。"); 
                return; 
            }

            let addAmount = 0;
            if (currentRank === 'bronze') { 
                addAmount = 1; 
            } else { 
                addAmount = (type === '宿泊') ? 2 : 1; 
            }

            points += addAmount;
            localStorage.setItem('hotel_points', points);
            updateUI();
            closePanel();
            
            alert(`【処理完了】\n+${addAmount}pt を付与しました。`);
        }

        function resetPoint() {
            const pin = prompt("【スタッフ確認】初期化コードを入力してください");
            if (pin === STAFF_PIN) {
                if(confirm('全てのポイントをリセットしますか？')) {
                    points = 0;
                    localStorage.setItem('hotel_points', points);
                    updateUI();
                    closePanel();
                    alert('初期化しました。');
                }
            } else { alert("暗証番号が違います。"); }
        }

        updateUI();
    </script>
</body>
</html>
