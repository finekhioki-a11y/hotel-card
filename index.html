<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Members Card</title>
    <link rel="manifest" href="manifest.json?v=9">
    <style>
        body {
            background-color: #0d0d0d; 
            color: #fff;
            font-family: 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 会員カードの土台 */
        .card-container {
            width: 330px;
            height: 208px;
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease;
        }

        /* すりガラス風のインフォメーションエリア */
        .info-overlay {
            position: absolute;
            right: 16px;
            top: 16px;
            pointer-events: none;
            
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            min-width: 150px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* ゲスト情報（文字が自動で切り替わる部分） */
        .member-info {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6); 
            margin-bottom: 2px;
            font-family: monospace;
        }

        /* ポイントカウントデザイン */
        .points-container {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* 「POINT」のラベル文字 */
        .points-label {
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: #d4af37; 
            text-transform: uppercase;
            margin-bottom: -2px;
        }

        /* 数字部分 */
        .points-display { 
            font-size: 32px; 
            font-weight: 200; 
            color: #ffffff; 
            line-height: 1;
            letter-spacing: -0.5px;
        }
        
        /* 単位（pt） */
        .points-unit {
            font-size: 14px;
            font-weight: 400;
            margin-left: 2px;
            color: rgba(255,255,255,0.7);
        }

        /* 隠しタップエリア（カード右下） */
        .secret-trigger {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 10;
        }

        /* スタッフ専用メニューの枠：黒をベースにほんのり茶の要素をプラス */
        .staff-section {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15); /* ほんのりゴールドの細線 */
            border-radius: 14px;
            text-align: center;
            background-color: #12100e; /* 高級感のある極めて深いダークブラウン黒 */
            width: 330px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .staff-title { 
            font-size: 11px; 
            color: #d4af37; /* タイトルもゴールドに統一 */
            margin-bottom: 14px; 
            font-weight: bold; 
            letter-spacing: 1.5px; 
        }
        
        /* 【注目】すべての操作ボタンを高級感のある「濃い茶色」に統一 */
        button.action-btn {
            background-color: #3d2a1d; /* 落ち着いた美しい濃い茶色（ダークブラウン） */
            color: #f5f0eb; /* 少し温かみのあるクラシックホワイトの文字 */
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 11px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 8px; /* 丸すぎない角丸にしてスタイリッシュに */
            cursor: pointer;
            margin: 5px 3px;
            width: 90px; /* 横幅を綺麗に揃えて美しく整列 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
            display: inline-block;
        }
        button.action-btn:active { 
            transform: scale(0.96); 
            background-color: #2b1d14; /* 押し込んだときはさらに深い茶色に */
        }
        
        /* 閉じるボタン：一歩引いたシックなグレー茶 */
        .close-btn { 
            background-color: #221f1d; 
            color: #8c827b; 
            border: none;
            font-size: 11px; 
            padding: 8px 16px; 
            margin-top: 15px; 
            border-radius: 6px; 
            cursor: pointer;
        }
        /* 初期化ボタン：ここだけは誤操作を防ぐため、非常に落ち着いたトーンのダークレッド */
        .reset-btn { 
            background-color: #2a1414; 
            color: #a65151; 
            border: none;
            font-size: 11px; 
            padding: 8px 16px; 
            margin-top: 5px; 
            border-radius: 6px; 
            cursor: pointer;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="card" class="card-container">
        
        <div class="info-overlay">
            <div id="rank-text" class="member-info">BRONZE USER</div>
            <div class="member-info" style="margin-bottom: 0;">No. 2026-8871</div>
            
            <div class="points-container">
                <div class="points-label">POINT</div>
                <div class="points-display"><span id="pt-count">0</span><span class="points-unit">pt</span></div>
            </div>
        </div>
        
        <div class="secret-trigger" onclick="handleSecretClick()"></div>
    </div>

    <div id="staff-panel" class="staff-section">
        <div class="staff-title">MANAGEMENT MENU</div>
        <button class="action-btn" onclick="processStay('休憩')">休憩<br><span style="font-size:10px; font-weight:normal; opacity:0.7;">(1pt)</span></button>
        <button class="action-btn" onclick="processStay('その他休憩')">他休憩<br><span style="font-size:10px; font-weight:normal; opacity:0.7;">(1pt)</span></button>
        <button class="action-btn" onclick="processStay('宿泊')">宿泊<br><span style="font-size:10px; font-weight:normal; opacity:0.7;">(2pt※)</span></button>
        <br>
        <button class="close-btn" onclick="closePanel()">メニューを閉じる</button>
        <br>
        <button class="reset-btn" onclick="resetPoint()">データを初期化</button>
    </div>

    <script>
        const STAFF_PIN = "7777"; 
        const RANK_THRESHOLDS = { silver: 10, gold: 30, platinum: 60 }; 

        let points = parseInt(localStorage.getItem('hotel_points')) || 0;
        let currentRank = 'bronze';

        let clickCount = 0;
        let clickTimer = null;

        function updateUI() {
            document.getElementById('pt-count').innerText = points;
            const card = document.getElementById('card');
            const rankText = document.getElementById('rank-text');
            
            if (points >= RANK_THRESHOLDS.platinum) {
                currentRank = 'platinum';
                card.style.backgroundImage = "url('platinum.png')";
                rankText.innerText = "PLATINUM USER";
            } else if (points >= RANK_THRESHOLDS.gold) {
                currentRank = 'gold';
                card.style.backgroundImage = "url('gold.png')";
                rankText.innerText = "GOLD USER";
