<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Members Card</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: #0a0a0a; /* 背景を黒にしてカードを目立たせる */
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            /* 画面のピンチズーム（拡大・縮小）を禁止してアプリ感を出す */
            touch-action: manipulation;
        }

        /* 会員カードの土台（ここに画像が表示されます） */
        .card-container {
            width: 330px;
            height: 208px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease; /* 画像が切り替わるときのアニメーション */
        }

        /* 【変更箇所】会員情報を「右上」に配置し、黒い半透明の座布団を敷く */
        .info-overlay {
            position: absolute;
            right: 15px; /* 右からの距離 */
            top: 15px;   /* 上からの距離 */
            font-size: 12px;
            font-family: monospace;
            pointer-events: none; /* タップイベントを邪魔しない */
            
            /* 背景に黒い半透明（薄い黒）を敷く設定 */
            background-color: rgba(0, 0, 0, 0.55); 
            /* 少し内側に余白（パディング）を作る */
            padding: 10px 15px;
            /* 四隅を少し丸くする */
            border-radius: 8px;
            /* 枠線をほんのり白く浮かび上がらせる */
            border: 1px solid rgba(255, 255, 255, 0.15);
            /* 文字が潰れないように最小の横幅を固定 */
            min-width: 160px;
        }
        .points-display { font-size: 16px; font-weight: bold; margin-top: 4px; color: #fff; }

        /* 【重要】カードの右下に配置する、隠しタップ用の完全に透明なボタン */
        .secret-trigger {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 10; /* 一番手前に配置 */
        }

        /* スタッフ専用メニュー（普段は非表示） */
        .staff-section {
            display: none; /* 最初は隠しておく */
            margin-top: 25px;
            padding: 15px;
            border: 1px dashed #555;
            border-radius: 10px;
            text-align: center;
            background-color: #1a1a1a;
            width: 330px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .staff-title { font-size: 12px; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        
        /* スタッフ用ボタンの見た目 */
        button {
            background-color: #fff;
            color: #1a1a1a;
            border: none;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:active { transform: scale(0.95); }
        .rest-btn { background-color: #e67e22; color: #fff; }
        .other-btn { background-color: #3498db; color: #fff; }
        .stay-btn { background-color: #2ecc71; color: #fff; }
        .close-btn { background-color: #444; color: #fff; font-size: 11px; padding: 5px 10px; margin-top: 15px; }
        .reset-btn { background-color: #ff4444; color: white; font-size: 11px; padding: 5px 10px; margin-top: 15px;}
    </style>
</head>
<body>

    <div id="card" class="card-container">
        
        <div class="info-overlay">
            <div>Member: GUEST USER</div>
            <div>No: 2026-8871</div>
            <div class="points-display">SCORE: <span id="pt-count">0</span> pt</div>
        </div>
        
        <div class="secret-trigger" onclick="handleSecretClick()"></div>
    </div>

    <div id="staff-panel" class="staff-section">
        <div class="staff-title">【スタッフ専用メニュー】</div>
        <button class="rest-btn" onclick="processStay('休憩')">休憩 (1pt)</button>
        <button class="other-btn" onclick="processStay('その他休憩')">
